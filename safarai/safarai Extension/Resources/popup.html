<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Safari AI Sidebar</p>
            <h1>当前页面上下文</h1>
            <p class="subtitle">Phase 0 骨架：读取页面，生成 mock 响应，验证宿主链路。</p>
        </header>

        <section class="panel status-panel">
            <div class="status-row">
                <span>宿主状态</span>
                <strong id="host-status">待检测</strong>
            </div>
            <div class="status-row">
                <span>登录阶段</span>
                <strong id="login-stage">空闲</strong>
            </div>
            <div class="status-row">
                <span>页面站点</span>
                <strong id="site-name">-</strong>
            </div>
            <div class="status-row">
                <span>日志</span>
                <button id="copy-logs" type="button">复制最近日志</button>
            </div>
        </section>

        <section class="panel draft-panel">
            <div class="section-head">
                <h2>账号</h2>
                <div class="button-row">
                    <button id="start-login" type="button">登录</button>
                    <button id="logout-account" type="button">退出</button>
                </div>
            </div>
            <div class="draft-meta">
                <span>当前账号</span>
                <strong id="account-email">未登录</strong>
            </div>
            <div class="draft-meta">
                <span>模型</span>
                <select id="model-select"></select>
            </div>
            <div class="button-row">
                <button id="refresh-models" type="button">刷新模型</button>
                <button id="save-model" type="button">保存模型</button>
            </div>
        </section>

        <section class="panel">
            <div class="section-head">
                <h2>页面摘要</h2>
                <button id="refresh-context" type="button">刷新上下文</button>
            </div>
            <dl class="context-grid">
                <div>
                    <dt>标题</dt>
                    <dd id="page-title">加载中</dd>
                </div>
                <div>
                    <dt>URL</dt>
                    <dd id="page-url">加载中</dd>
                </div>
                <div>
                    <dt>选中文本</dt>
                    <dd id="page-selection">加载中</dd>
                </div>
                <div>
                    <dt>聚焦输入框</dt>
                    <dd id="focused-input">加载中</dd>
                </div>
                <div>
                    <dt>页面类型</dt>
                    <dd id="page-kind">加载中</dd>
                </div>
                <div>
                    <dt>仓库</dt>
                    <dd id="page-repository">加载中</dd>
                </div>
            </dl>
        </section>

        <section class="panel actions">
            <button id="summarize-page" type="button">总结当前页面</button>
            <button id="explain-selection" type="button">解释选中文本</button>
        </section>

        <section class="panel actions">
            <button id="extract-structured-info" type="button">提取结构化信息</button>
            <button id="copy-answer" type="button">复制当前回答</button>
        </section>

        <section class="panel draft-panel">
            <div class="section-head">
                <h2>页面问答</h2>
                <button id="ask-page" type="button">发送问题</button>
            </div>
            <textarea id="question-editor" placeholder="例如：这个 PR 的核心改动是什么？" spellcheck="false"></textarea>
        </section>

        <section class="panel conversation-panel">
            <div class="section-head">
                <h2>最近会话</h2>
                <strong id="conversation-status">空</strong>
            </div>
            <div id="conversation-list" class="conversation-list"></div>
        </section>

        <section class="panel actions">
            <button id="generate-draft" type="button">为当前输入框生成草稿</button>
            <button id="apply-draft" type="button" disabled>确认写入页面</button>
        </section>

        <section class="panel draft-panel">
            <div class="section-head">
                <h2>写入确认</h2>
                <button id="copy-draft" type="button" disabled>复制草稿</button>
            </div>
            <div class="draft-meta">
                <span>目标</span>
                <strong id="draft-target">尚未生成草稿</strong>
            </div>
            <textarea id="draft-editor" placeholder="生成草稿后，可在这里手动调整内容。" spellcheck="false"></textarea>
        </section>

        <section class="panel answer-panel">
            <h2>AI 返回</h2>
            <pre id="answer-output">等待操作</pre>
        </section>
    </main>
</body>
</html>
